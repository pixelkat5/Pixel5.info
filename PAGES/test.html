<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.lazyload.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.arrows.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.thumbs.css"/>

    <style>
      #myCarousel {
        --f-arrow-pos: 10px;
        --f-arrow-bg: rgba(255, 255, 255, 0.75);
        --f-arrow-hover-bg: rgba(255, 255, 255, 1);
        --f-arrow-color: #333;
        --f-arrow-width: 40px;
        --f-arrow-height: 40px;
        --f-arrow-svg-width: 20px;
        --f-arrow-svg-height: 20px;
        --f-arrow-svg-stroke-width: 2px;
        --f-arrow-border-radius: 50%;
        height: 400px;
      }

      #myCarousel .f-carousel__slide {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #myCarousel img {
        max-width: 100%;
        max-height: 100%;
        height: auto;
        object-fit: contain;
      }

      .collapsible {
        background-color: #777;
        color: white;
        cursor: pointer;
        padding: 18px;
        width: 100%;
        border: none;
        text-align: left;
        outline: none;
        font-size: 15px;
      }

      .active,
      .collapsible:hover {
        background-color: #555;
      }

      .content {
        padding: 0 18px;
        display: none;
        overflow: hidden;
        background-color: #f1f1f1;
      }
    </style>
  </head>
  <body>
    <button type="button" class="collapsible">Collapsible</button>
    <div class="content">
      <div class="f-carousel" id="myCarousel">
        <div class="f-carousel__slide" data-fancybox="gallery" data-src="https://lipsum.app/id/68/1920x1080" data-thumb-src="https://lipsum.app/id/68/1920x1080">
          <img data-lazy-src="https://lipsum.app/id/68/1920x1080" width="1920" height="1080" alt="Image #1"/>
        </div>
        <div class="f-carousel__slide" data-fancybox="gallery" data-src="https://lipsum.app/id/58/1920x1080" data-thumb-src="https://lipsum.app/id/58/1920x1080">
          <img data-lazy-src="https://lipsum.app/id/58/1920x1080" width="1920" height="1080" alt="Image #2"/>
        </div>
        <div class="f-carousel__slide" data-fancybox="gallery" data-src="https://lipsum.app/id/3/1920x1080" data-thumb-src="https://lipsum.app/id/3/1920x1080">
          <img data-lazy-src="https://lipsum.app/id/3/1920x1080" width="1920" height="1080" alt="Image #3"/>
        </div>
        <div class="f-carousel__slide" data-fancybox="gallery" data-src="https://lipsum.app/id/62/1920x1080" data-thumb-src="https://lipsum.app/id/62/1920x1080">
          <img data-lazy-src="https://lipsum.app/id/62/1920x1080" width="1920" height="1080" alt="Image #4"/>
        </div>
        <div class="f-carousel__slide" data-fancybox="gallery" data-src="https://lipsum.app/id/63/1920x1080" data-thumb-src="https://lipsum.app/id/63/1920x1080">
          <img data-lazy-src="https://lipsum.app/id/63/1920x1080" width="1920" height="1080" alt="Image #5"/>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.lazyload.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.arrows.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.thumbs.umd.js"></script>

    <script>
      Carousel(
        document.getElementById("myCarousel"),
        {
          
        },
        {
          Lazyload,
          Arrows,
          Thumbs,
        },
      ).init();

      Fancybox.bind("[data-fancybox]", {

      });

      var coll = document.getElementsByClassName("collapsible");
      var i;

      for (i = 0; i < coll.length; i++) {
        coll[i].addEventListener("click", function () {
          this.classList.toggle("active");
          var content = this.nextElementSibling;
          if (content.style.display === "block") {
            content.style.display = "none";
          } else {
            content.style.display = "block";
          }
        });
      }
    </script>
  </body>
</html>
